<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Renault car radio unlock code generator. Runs entirely in your browser — no data is sent to any server." />
  <title>Renault Radio Code Calculator</title>
  <link rel="icon" type="image/svg+xml" href="../favicon.svg" />
  <style>
    :root {
      --bg: #0b1020;
      --card: #131a2e;
      --accent: #2f6bff;
      --accent-2: #1e4fd0;
      --text: #e7ecf7;
      --muted: #8a97b3;
      --ok: #2ecc71;
      --err: #ff5c6c;
      --warn: #ffb454;
      --border: #24304d;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: radial-gradient(1200px 600px at 50% -10%, #16234a 0%, var(--bg) 60%);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      width: 100%;
      max-width: 460px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.45);
    }
    h1 { margin: 0 0 4px; font-size: 1.4rem; letter-spacing: 0.3px; }
    .sub { margin: 0 0 22px; color: var(--muted); font-size: 0.9rem; }
    label { display: block; font-size: 0.85rem; color: var(--muted); margin-bottom: 8px; }
    input[type="text"] {
      width: 100%;
      background: #0d1424;
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      padding: 14px 16px;
      font-size: 1.2rem;
      letter-spacing: 4px;
      text-transform: uppercase;
      outline: none;
      transition: border-color 0.15s;
    }
    input[type="text"]:focus { border-color: var(--accent); }
    .hint { margin-top: 10px; font-size: 0.78rem; color: var(--muted); }
    .result {
      margin-top: 22px;
      border: 1px dashed var(--border);
      border-radius: 12px;
      padding: 18px;
      text-align: center;
    }
    .result .rlabel { font-size: 0.8rem; color: var(--muted); margin-bottom: 6px; }
    .result .code {
      font-size: 2.6rem;
      font-weight: 700;
      letter-spacing: 10px;
      color: var(--ok);
      font-variant-numeric: tabular-nums;
    }
    .msg { margin-top: 16px; border-radius: 10px; padding: 12px 14px; font-size: 0.85rem; line-height: 1.5; }
    .msg.warn { background: rgba(255,180,84,0.12); border: 1px solid rgba(255,180,84,0.35); color: var(--warn); }
    .msg.err  { background: rgba(255,92,108,0.12); border: 1px solid rgba(255,92,108,0.4); color: var(--err); }
    .msg.ok   { background: rgba(46,204,113,0.10); border: 1px solid rgba(46,204,113,0.3); color: var(--text); }
    .msg ol { margin: 8px 0 0; padding-left: 20px; }
    .msg li { margin: 3px 0; }
    kbd {
      background: #0d1424; border: 1px solid var(--border); border-bottom-width: 2px;
      border-radius: 5px; padding: 1px 6px; font-size: 0.8rem;
    }
    code.k { color: var(--ok); font-weight: 700; }
    footer { margin-top: 18px; text-align: center; font-size: 0.72rem; color: var(--muted); }
  </style>
</head>
<body>
  <main class="card">
    <p style="margin:0 0 14px"><a href="../" style="color:#8a97b3;text-decoration:none;font-size:0.85rem">&larr; All calculators</a></p>
    <h1>Renault Radio Code Calculator</h1>
    <p class="sub">Enter the pre-code from your radio to recover the unlock code.</p>

    <label for="precode">Pre-code (a letter + 3 digits, e.g. A123)</label>
    <input id="precode" type="text" maxlength="4" placeholder="A123"
           autocomplete="off" spellcheck="false" inputmode="latin" />
    <p class="hint">
      The pre-code is printed on the radio, or shown by holding <kbd>1</kbd>+<kbd>6</kbd>
      (or <kbd>1</kbd>+<kbd>5</kbd>) then the power button.
    </p>

    <div id="output"></div>

    <footer>Runs entirely in your browser — no data leaves your device.</footer>
  </main>

  <script>
    const input = document.getElementById("precode");
    const output = document.getElementById("output");

    function normalize(precode) {
      precode = precode.toUpperCase();
      if (!/^[A-Z]\d{3}$/.test(precode) || precode.startsWith("A0")) return "";
      return precode;
    }

    function computeCode(precode) {
      const x = precode.charCodeAt(1) + precode.charCodeAt(0) * 10 - 698;
      const y = precode.charCodeAt(3) + precode.charCodeAt(2) * 10 + x - 528;
      const z = (y * 7) % 100;
      const code = Math.floor(z / 10) + (z % 10) * 10 + ((259 % x) % 100) * 100;
      return code.toString().padStart(4, "0");
    }

    function render() {
      const raw = input.value.toUpperCase();
      const precode = normalize(raw);

      if (precode === "") {
        const isA0 = raw.startsWith("A0");
        output.innerHTML =
          '<div class="msg warn"><strong>The pre-code must be one letter followed by 3 digits' +
          ' (example: <code class="k">A123</code>).</strong></div>' +
          (isA0
            ? '<div class="msg err">The code calculation does not work for pre-codes starting with <strong><code>A0</code></strong>.</div>'
            : "");
        return;
      }

      const code = computeCode(precode);
      const d = code.split("");
      let steps = "";
      for (let i = 0; i < 4; i++) {
        if (+d[i] > 0)
          steps += '<li>Press button <kbd>' + (i + 1) + '</kbd> <strong><code class="k">' +
                   d[i] + '</code></strong> time(s).</li>';
      }
      steps += '<li>Hold button <kbd>6</kbd> (or <kbd>5</kbd>) to finish.</li>';

      output.innerHTML =
        '<div class="result"><div class="rlabel">Unlock code</div>' +
        '<div class="code">' + code + '</div></div>' +
        '<div class="msg ok">To activate your radio:<ol>' + steps + '</ol></div>';
    }

    input.addEventListener("input", () => {
      input.value = input.value.toUpperCase().replace(/[^A-Z0-9]/g, "");
      render();
    });

    render();
  </script>
</body>
</html>
